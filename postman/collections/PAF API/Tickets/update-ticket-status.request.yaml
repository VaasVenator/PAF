$kind: http-request
name: 'Update Ticket Status'
method: PATCH
url: '{{baseUrl}}/api/tickets/{{ticketId}}/status'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "IN_PROGRESS",
      "resolutionNotes": "Technician investigating switch issue",
      "rejectionReason": ""
    }
